name: Build and Push to DockerHub

on:
  push:
    branches: [main]
    tags: ["*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: therealphatt
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: therealphatt/mirofish-unraid
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=latest

      - name: Debug Docker environment
        run: |
          echo "=== Docker version ==="
          docker version 2>&1 || echo "docker version FAILED"
          echo ""
          echo "=== Docker info ==="
          docker info 2>&1 | head -20 || echo "docker info FAILED"
          echo ""
          echo "=== Buildx version ==="
          docker buildx version 2>&1 || echo "buildx FAILED"
          echo ""
          echo "=== Buildx ls ==="
          docker buildx ls 2>&1 || echo "buildx ls FAILED"
          echo ""
          echo "=== Listing ==="
          ls -la

      - name: Build and push
        run: |
          echo "=== Starting build ==="
          docker buildx build --platform linux/amd64 --tag therealphatt/mirofish-unraid:debug --push . 2>&1

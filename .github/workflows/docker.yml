name: Build and Push to DockerHub

on:
  push:
    branches: [main]
    tags: ["*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: therealphatt
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: therealphatt/mirofish-unraid
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=latest

      - name: Debug Docker environment
        run: |
          echo "=== Docker version ==="
          docker version 2>&1 || echo "docker version FAILED"
          echo ""
          echo "=== Buildx ls ==="
          docker buildx ls 2>&1 || echo "buildx ls FAILED"
          echo ""
          echo "=== Listing ==="
          ls -la

      - name: Build test image
        run: |
          echo "=== Testing simple docker build ==="
          docker build -t test:local -f Dockerfile . 2>&1 | tail -5
          echo "exit: $?"

      - name: Push test image with explicit auth
        run: |
          echo "=== Re-authing to DockerHub ==="
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u therealphatt --password-stdin
          echo "=== Push test ==="
          docker tag test:local therealphatt/mirofish-unraid:debug
          docker push therealphatt/mirofish-unraid:debug 2>&1
          echo "push exit: $?"

      - name: Build and push
        run: |
          echo "=== Starting full build ==="
          docker buildx build --platform linux/amd64 --tag therealphatt/mirofish-unraid:debug --push . 2>&1

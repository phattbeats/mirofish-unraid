name: Build and Push to DockerHub

on:
  push:
    branches: [main]
    tags: ["*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: therealphatt
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: therealphatt/mirofish-unraid
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=latest

      - name: Test push nginx
        run: |
          docker pull nginx:latest 2>&1 | tail -3
          docker tag nginx:latest therealphatt/mirofish-unraid:test-nginx
          docker push therealphatt/mirofish-unraid:test-nginx 2>&1
          echo "nginx push exit: $?"

      - name: Build and push
        run: |
          docker buildx build --platform linux/amd64 \
            --tag therealphatt/mirofish-unraid:$(echo $GITHUB_SHA | cut -c1-7) \
            --push . 2>&1 | head -100
          echo "exit: $?"

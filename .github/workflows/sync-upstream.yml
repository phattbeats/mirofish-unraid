name: Sync Fork with Upstream

on:
  schedule:
    # Sync every 24 hours at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: sync-fork
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout my fork
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/666ghj/mirofish.git
          git fetch upstream

      - name: Check for upstream changes
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "Commits behind upstream: $BEHIND"
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          if [ "$BEHIND" -gt "0" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Merge upstream main into my main
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git checkout main
          git merge upstream/main --no-edit --autostash

      - name: Push to my fork
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git push origin main

      - name: Check for new upstream tags
        if: steps.check.outputs.has_changes == 'true'
        id: new_tag
        run: |
          UPSTREAM_TAG=$(git describe --tags upstream/main 2>/dev/null | sed 's/^v//')
          echo "Latest upstream tag: $UPSTREAM_TAG"
          echo "tag=v${UPSTREAM_TAG:-latest}" >> $GITHUB_OUTPUT

      - name: Tag and push version tag
        if: steps.check.outputs.has_changes == 'true' && steps.new_tag.outputs.tag != ''
        run: |
          git tag -f "${{ steps.new_tag.outputs.tag }}"
          git push origin "${{ steps.new_tag.outputs.tag }}" --force 2>/dev/null || true

      - name: Set merged output
        id: merged
        run: |
          if git diff --quiet HEAD upstream/main 2>/dev/null; then
            echo "result=no" >> $GITHUB_OUTPUT
          else
            echo "result=yes" >> $GITHUB_OUTPUT
          fi

  trigger-docker:
    needs: [sync, merged]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || needs.merged.outputs.result == 'yes'
    permissions:
      contents: read
    steps:
      - name: Trigger Docker Hub build
        run: |
          echo "Changes synced — triggering Docker Hub build"
          gh workflow run dockerhub.yml --repo phattbeats/mirofish-unraid
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
